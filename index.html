    :root {

    * { box-sizing: border-box; }

    body {

        linear-gradient(0deg, rgba(20, 33, 61, .035) 1px, transparent 1px),
        var(--paper);
      background-size: 22px 22px;
      color: var(--ink);
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(100%, 920px);
      margin: 0 auto;
      min-height: 100vh;
      padding: env(safe-area-inset-top) 14px calc(16px + env(safe-area-inset-bottom));
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 0 10px;
      background: linear-gradient(180deg, var(--paper) 78%, rgba(248, 244, 232, 0));
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand img {
      width: 42px;
      height: 42px;
      flex: 0 0 auto;
    }

    .brand h1 {
      margin: 0;
      font-family: Georgia, "Songti SC", serif;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-size: 13px;
      white-space: nowrap;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin: 8px 0 12px;
    }

    .stat {
      min-height: 72px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 246, .86);
      box-shadow: 0 8px 20px rgba(20, 33, 61, .06);
    }

    .stat strong {
      display: block;
      font-size: 22px;
      line-height: 1.1;
    }

    .stat span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .controls {
      display: grid;
      gap: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .segments {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ece3cf;
    }

    .segments button,
    .filter button,
    .small-button {
      min-height: 38px;
      border-radius: 7px;
      color: var(--ink);
      background: transparent;
      transition: transform .12s ease, background .12s ease, color .12s ease;
    }

    .segments button.active,
    .filter button.active {
      background: var(--ink);
      color: white;
    }

    .filter {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .filter button {
      border: 1px solid var(--line);
      background: white;
      font-size: 13px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search-row input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      padding: 0 12px;
      outline: none;
    }

    .small-button {
      border: 1px solid var(--line);
      background: white;
      padding: 0 12px;
    }

    .question {
      overflow: hidden;
    }

    .question-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px;
      border-bottom: 1px solid var(--line);
      background: #fff8e6;
    }

    .tag-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 0 8px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 700;
      background: rgba(42, 157, 143, .12);
      color: #16675e;
    }

    .tag.multi { background: rgba(252, 163, 17, .18); color: #8a5600; }
    .tag.judge { background: rgba(39, 125, 161, .14); color: #17536c; }

    .progress-text {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .stem {
      padding: 18px 14px 12px;
      font-size: 20px;
      line-height: 1.55;
      font-weight: 800;
      word-break: break-word;
    }

    .options {
      display: grid;
      gap: 10px;
      padding: 0 14px 14px;
    }

    .option {
      display: grid;
      grid-template-columns: 36px 1fr;
      align-items: start;
      gap: 10px;
      width: 100%;
      min-height: 54px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: white;
      color: var(--ink);
      text-align: left;
      transition: transform .12s ease, border-color .12s ease, background .12s ease;
    }

    .option:active,
    .segments button:active,
    .filter button:active,
    .small-button:active,
    .primary:active,
    .ghost:active {
      transform: translateY(1px);
    }

    .option.selected {
      border-color: var(--blue);
      background: rgba(39, 125, 161, .09);
    }

    .option.correct {
      border-color: var(--green);
      background: rgba(42, 157, 143, .13);
    }

    .option.wrong {
      border-color: var(--red);
      background: rgba(209, 73, 91, .10);
    }

    .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--ink);
      color: white;
      font-weight: 800;
    }

    .option-text {
      padding-top: 5px;
      line-height: 1.45;
      word-break: break-word;
    }

    .feedback {
      margin: 0 14px 14px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff8e6;
      line-height: 1.55;
    }

    .feedback.good {
      border-color: rgba(42, 157, 143, .45);
      background: rgba(42, 157, 143, .10);
    }

    .feedback.bad {
      border-color: rgba(209, 73, 91, .45);
      background: rgba(209, 73, 91, .10);
    }

    .actions {
      position: static;
      z-index: 8;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
      padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
      background: rgba(248, 244, 232, .94);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .primary,
    .ghost {
      min-height: 52px;
      border-radius: 8px;
      font-weight: 800;
    }

    .primary {
      background: var(--amber);
      color: #241706;
    }

    .primary:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    .ghost {
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
    }

    .empty {
      padding: 28px 18px;
      text-align: center;
      line-height: 1.6;
      color: var(--muted);
    }

    .drawer {
      display: none;
      margin-top: 12px;
      padding: 12px;
    }

    .drawer.open {
      display: block;
    }

    .drawer h2 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .drawer p {
      margin: 8px 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 14px;
    }

    @media (min-width: 720px) {
      .app {
        padding-left: 24px;
        padding-right: 24px;

        align-items: start;
      }

      .controls {
        position: sticky;
        top: 74px;
      }

      .stem {

        padding: 24px 22px 16px;
      }

      .options {
        padding: 0 22px 22px;
      }

      .feedback {
        margin: 0 22px 22px;
      }
    }
  </style>
</head>

id":"判断题-57","source":"判断题","type":"判断","stem":"经济衰退时期电力行业景气度会上升。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-58","source":"判断题","type":"判断","stem":"《能源法》明确支持可再生能源的开发利用。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-59","source":"判断题","type":"判断","stem":"疫情期间，超过70%的员工体验过居家办公。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-60","source":"判断题","type":"判断","stem":"职业变迁不需要员工调整职业规划。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-61","source":"判断题","type":"判断","stem":"全球化导致职业标准趋向统一。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-62","source":"判断题","type":"判断","stem":"推进电力调度运行机制的信息化和智能化建设既可以提高调度效率，也能够优化资源配置。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-63","source":"判断题","type":"判断","stem":"挂牌交易模式包括单边集中挂牌、单边连续挂牌、双边集中挂牌和双边连续挂牌。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-64","source":"判断题","type":"判断","stem":"直流互联的两个交流电网，两个电网的频率可以不相同。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-65","source":"判断题","type":"判断","stem":"对于电力用户的高峰、低谷用电价格比例系数，目前采取政府核定方式。在现货市场连续运行后，仍将继续保留。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-66","source":"判断题","type":"判断","stem":"峰荷定价理论主要适用于需求周期性变化、固定成本高且可变成本低的行业，例如电力行业。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-67","source":"判断题","type":"判断","stem":"对于一个省级市场，省级电力调度中心对发电机组下达的调度指令涉及发电计划的执行、维护计划的安排等，包括发电机负荷分配。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-68","source":"判断题","type":"判断","stem":"集中式全电量现货出清过程，在数学上是混合整数规划的求解过程，经常得不到最优解。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-69","source":"判断题","type":"判断","stem":"在集中式全电量现货出清中，理论上可以对重要输电断面的暂态稳定限额、系统负荷预测、母线负荷预测进行修正。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-70","source":"判断题","type":"判断","stem":"《关于加快建设全国统一电力市场体系的指导意见》，系统规划了今后一个时期中国电力体制改革的使命任务、方向目标和主要举措","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-71","source":"判断题","type":"判断","stem":"非线性定价策略通常是为了增加社会福利，因为它通过为不同消费者提供统一的价格，使资源分配更为高效。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-72","source":"判断题","type":"判断","stem":"消费者剩余是买者的支付意愿减去卖者的生产成本。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-73","source":"判断题","type":"判断","stem":"对于大多数发电企业来说，发电量始终小于上网电量。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-74","source":"判断题","type":"判断","stem":"对用电负荷而言，容性无功时，其电流的相角超前于电压","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-75","source":"判断题","type":"判断","stem":"长期边际成本曲线LMC是短期边际成本曲线SMC的包络线。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-76","source":"判断题","type":"判断","stem":"对用电负荷而言，当存在感性无功时，其电流的相角超前于电压","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-77","source":"判断题","type":"判断","stem":"平均可变成本曲线AVC的最低点在平均成本曲线AC最低点之后达到。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-78","source":"判断题","type":"判断","stem":"现货市场SCED出清结果，不能引起系统任何输电线路、断面或设备超过热稳定或者静态稳定限额。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-79","source":"判断题","type":"判断","stem":"在我国，标准频率是50HZ，目前各省正常运行的状态下，允许的偏差范围是正负0.5HZ。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-80","source":"判断题","type":"判断","stem":"中枢点电压及联络线功率控制的潮流计算过程中，计算的输出值都需要辅助潮流计算来得到调整量的最终值。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-81","source":"判断题","type":"判断","stem":"短期生产函数用于描述在一定时间内，劳动力和资本固定的情况下，产出与输入之间的关系。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-82","source":"判断题","type":"判断","stem":"目前的碳市场交易和电力市场交易没有直接关联","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-83","source":"判断题","type":"判断","stem":"在边际定价模型下，最后一台被接受的发电机组（即边际机组）的报价即为系统出清价格。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-84","source":"判断题","type":"判断","stem":"从国际上看，存在50HZ和60HZ两种不同的频率标准，两种频率标准的电网不能交流互联。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-85","source":"判断题","type":"判断","stem":"在市场出清以社会福利最大化为目标的前提下，定价和结算机制需要满足参与理性原则，即：结算价对于发电方不低于其报价，对于用户不高于其报价。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-86","source":"判断题","type":"判断","stem":"电力交易中心可以组织风电、光伏企业绿色电量（含绿色证书）的交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-87","source":"判断题","type":"判断","stem":"在供需平衡点，需求量与供给量相等，市场达到了均衡。在这一点价格既没有上升，也没有下降的趋势，这一点的价格被称为市场出清价格或市场清除价，意味着所有供给和需求定单都已完成，所有需求者和供给者都得到了满足","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-88","source":"判断题","type":"判断","stem":"根据需求法则，需求是一条向上的曲线；而根据供给法则，供给是一条向下的曲线。一条向上，一条向下，画到一个坐标系中，就会相交，这就是供需平衡。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-89","source":"判断题","type":"判断","stem":"我国省间电力现货市场的雏形是跨区域省间富余可再生能源电力现货交易市场。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-90","source":"判断题","type":"判断","stem":"发电设备的调频可以理解成发电设备的无功出力增减。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-91","source":"判断题","type":"判断","stem":"根据需求理论，一种商品的价格增加，其需求量减少。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-92","source":"判断题","type":"判断","stem":"工商业用户的电费中，功率因数调整系数取决于用户的无功功率大小，居民和农业用户不对功率因数进行考核。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-93","source":"判断题","type":"判断","stem":"我国的电网频率50HZ，折合到常规发电机组每分钟是3000转的转速。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-94","source":"判断题","type":"判断","stem":"在电力系统中，35KV及以下的配电网络采取中性点不接地的运行方式。当发生单相接地故障时，允许非故障相的电压短时升高到线电压水平继续运行。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-95","source":"判断题","type":"判断","stem":"电力系统的输电网络中，电压等级通常分为高压、超高压和特高压。在中国，330kV和500kV的输电线路属于高压输电线路。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-96","source":"判断题","type":"判断","stem":"民法典中的供用电合同内容和零售侧售电合同内容基本一致。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-97","source":"判断题","type":"判断","stem":"参与市场化交易的发电企业和电力用户原则上不得自行退市。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-98","source":"判断题","type":"判断","stem":"根据《电力市场注册基本规则》，市场主体在完成注册后，其注册信息发生变更时，无需向电力交易机构提交变更申请及变更材料。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-99","source":"判断题","type":"判断","stem":"市场主体行为准则及权利、义务按照《电力市场基本运行规则》等相关文件中的要求进行管理。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-100","source":"判断题","type":"判断","stem":"价差分成套餐中，售电公司批发侧实际交易均价由售电公司自行核算。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-101","source":"判断题","type":"判断","stem":"山东电力现货市场于2024年9月转入正式运行。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-102","source":"判断题","type":"判断","stem":"电力用户做深入的访谈以及调取尽可能多的历史用电资料（电费核查联）加深对用户的了解。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-103","source":"判断题","type":"判断","stem":"信息披露主体按照标准格式通过信息披露平台向电力交易机构提供信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-104","source":"判断题","type":"判断","stem":"在进行主体数据设置时，交易员应当遵循最小必要原则，仅收集和设置与交易直接相关的主体信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-105","source":"判断题","type":"判断","stem":"电力交易平台主体数据设置时，可以忽略主体在环保、安全等方面的合规记录，因为这些信息与交易无关。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-106","source":"判断题","type":"判断","stem":"在主体数据设置中，交易员应当确保所有主体信息的准确性和最新性，以避免因信息不准确导致的交易风险。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-107","source":"判断题","type":"判断","stem":"为了提高交易效率，交易平台可以自动同步外部系统中的主体数据，无需人工干预。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-108","source":"判断题","type":"判断","stem":"交易平台主体数据设置时，不需要考虑主体之间的关联关系，如控股关系或集团内部交易等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-109","source":"判断题","type":"判断","stem":"在电力交易平台上，主体数据的变更必须通过书面申请并经过审核后，才能由系统管理员在系统中进行更新。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-110","source":"判断题","type":"判断","stem":"主体数据设置中，系统管理员可以为不同类型的交易主体设置不同的交易权限和额度限制，以适应不同的交易需求。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-111","source":"判断题","type":"判断","stem":"售电公司完成售电资质公示并通过后，才能签订相关的购售电合同。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-112","source":"判断题","type":"判断","stem":"售电公司强制退出条件启动后，无需向社会公示。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-113","source":"判断题","type":"判断","stem":"交易平台在设置主体数据时，可以允许同一主体使用多个账户进行交易，以提高交易灵活性。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-114","source":"判断题","type":"判断","stem":"交易平台主体数据设置时，必须将所有参与交易的电力用户和发电企业的详细信息纳入系统，包括但不限于资质证书、联系方式等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-115","source":"判断题","type":"判断","stem":"电力交易报价数据的合规性审查中包括数据来源的可靠性。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-116","source":"判断题","type":"判断","stem":"电力交易报价数据的规则限制中，地域限制是指某些地区可能禁止或限制某些类型的电力交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-117","source":"判断题","type":"判断","stem":"电力交易报价数据的规则限制中，数量限制是为了避免市场垄断。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-118","source":"判断题","type":"判断","stem":"电力交易报价数据的规则限制中，时间限制是指报价必须在交易日当天或之前提交。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-119","source":"判断题","type":"判断","stem":"电力交易报价数据的规则限制中，价格限制是为了防止过度投机，确保公平竞争。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-120","source":"判断题","type":"判断","stem":"电力交易报价数据的合规性审查中，数据是否符合要求主要指系统要求确认到小数点后两位。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-121","source":"判断题","type":"判断","stem":"电力交易报价数据的合规性审查中，价格是否符合要求主要避免价格过低过高不符合相关事实。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-122","source":"判断题","type":"判断","stem":"电力交易报价数据的单位只能是兆瓦时（MWh），不能使用千瓦时（kWh）。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-123","source":"判断题","type":"判断","stem":"售电企业申报交易数据中，代理购电合约和代理用电数据是必须提供的信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-124","source":"判断题","type":"判断","stem":"发电企业在申报交易数据时，只需提供交易电量和交易价格，无需提供成交电量和成交电价。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-125","source":"判断题","type":"判断","stem":"电力交易报价数据错误的纠正中，当用户申报量、申报价格不符合平台限制条件时，系统会自动修改。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-126","source":"判断题","type":"判断","stem":"电力交易报价数据中，申报表还应包括申报年月、交易序列标识、申报人等数据内容。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-127","source":"判断题","type":"判断","stem":"售电企业申报交易数据中包括代理用电数据，指的是售电公司代理零售用户的负荷。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-128","source":"判断题","type":"判断","stem":"电力交易报价数据的合规性审查中，数据是否符合要求主要指数据来源可靠。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-129","source":"判断题","type":"判断","stem":"电力交易报价数据的合规性审查中，价格是否符合要求主要避免价格波动。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-130","source":"判断题","type":"判断","stem":"电力交易报价数据的规则限制中包括价格限制、时间限制和数量限制。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-131","source":"判断题","type":"判断","stem":"电力交易报价数据规格中包括数据来源、数据格式、数据质量和数据指标。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-132","source":"判断题","type":"判断","stem":"发电企业申报交易数据中包括代理购电合约。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-133","source":"判断题","type":"判断","stem":"在电力交易报价数据中，如果某条记录的时间戳格式不统一（如部分为“YYYY-MM-DD”，部分为“YYYY/MM/DD”），这属于数据规范性问题。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-134","source":"判断题","type":"判断","stem":"在电力交易报价数据中，如果某条记录的报价时间戳缺失，但报价数值和交易时段完整，该数据仍可视为规范且完整的数据。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-135","source":"判断题","type":"判断","stem":"在电力市场中，市场经营主体的信用占用度越高，说明其在市场中的交易活跃度一定越高。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-136","source":"判断题","type":"判断","stem":"当市场经营主体信用占用度达到最高级别时，市场管理机构才能对市场经营主体进行信用额度预警或通。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-137","source":"判断题","type":"判断","stem":"电力交易机构可根据市场运行实际，对初始信用额度及其调增要求提出调整并且实施。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-138","source":"判断题","type":"判断","stem":"市场经营主体的无担保信用额度等于市场经营主体的无形净资产（TNW）×无形净资产比例（TNW%）","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-139","source":"判断题","type":"判断","stem":"市场经营主体获得担保信用额度的方式为，向信用管理机构提交相应金额的担保品。可用于获取担保信用额度的担保品类型由信用管理机构确定。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-140","source":"判断题","type":"判断","stem":"信用额度帮助市场管理机构控制结算风险，确保市场参与者能够履行其交易义务。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-141","source":"判断题","type":"判断","stem":"在电力市场电价风险管理台账的更新中，依赖自动化数据采集系统即可确保台账数据的全面性和准确性。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-142","source":"判断题","type":"判断","stem":"外部和内部电价风险的风险影响度同样很高，同时它们都可以在短期判断其风险影响度大小。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-143","source":"判断题","type":"判断","stem":"电价的剧烈波动可能导致市场参与者的不确定性增加，并且对所有电力用户都会产生较大的影响。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-144","source":"判断题","type":"判断","stem":"对于风险因素等级的判别方法，行业内有一套标准的判断标准。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-145","source":"判断题","type":"判断","stem":"电力市场交易策略按照交易时间分类可分为长期和短期交易策略。除此之外还可以按照交易品种、市场类型区分。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-146","source":"判断题","type":"判断","stem":"随着电力体制改革的进行，我国所有电厂的上网电价都由市场交易进行确定","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-147","source":"判断题","type":"判断","stem":"风险管理策略应包括风险识别、风险量化、风险控制和风险监测，定期的风险评估和审计有助于及时发现潜在问题并采取相应措施。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-148","source":"判断题","type":"判断","stem":"对严重违法失信的市场经营主体可按照有关部门要求取消市场交易资格，强制退出电力市场","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-149","source":"判断题","type":"判断","stem":"分散投资能消除非系统性风险，实现同等收益下的风险最小化或同等风险下的收益最大化。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-150","source":"判断题","type":"判断","stem":"核对结算单的整体结算情况时，可以不核对结算单中的总结算电量、结算电费、售电公司收益是否与自身用电情况相符。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-151","source":"判断题","type":"判断","stem":"调峰服务费用应由火电（燃煤、燃气）、风电、光伏（扶贫光伏场站除外）等发电企业及参与市场化交易的用户共同承担。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-152","source":"判断题","type":"判断","stem":"电力辅助服务是指为维持电力系统安全稳定运行，保证电能质量，促进清洁能源消纳，除正常电能生产、输送、使用外，由火电、水电、核电、风电、光伏发电、光热发电、抽水蓄能、自备电厂等发电侧并网主体，电化学、压缩空气、飞轮等新型储能，传统高载能工业负荷、工商业可中断负荷、电动汽车充电网络等能够响应电力调度指令的可调节负荷(含通过聚合商、虚拟电厂等形式聚合)提供的服务。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-153","source":"判断题","type":"判断","stem":"电容量电价机制适用于合规在运的公用煤电机组、燃煤自备电厂、不符合国家规划的煤电机组，以及不满足国家对于能耗、环保和灵活调节能力等要求的煤电机组。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-154","source":"判断题","type":"判断","stem":"未运行日前市场、仅运行实时市场的省内现货市场（结算方式二）用户侧结算，根据市场构成不同，中长期结算参考点的现货价格不可以由日前市场出清价格或者实时市场出清价格确定。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-155","source":"判断题","type":"判断","stem":"未运行日前市场、仅运行实时市场的省内现货市场（结算方式一）用户侧结算，中长期差价合约电费＝Σ[合约电量×（合约价格－中长期结算参考点现货电价）]。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-156","source":"判断题","type":"判断","stem":"运行日前市场的省内现货市场（结算方式二），根据市场构成不同，中长期结算参考点的现货价格可以由日前市场出清价格或者实时市场出清价格确定。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-157","source":"判断题","type":"判断","stem":"非现货市场零售用户耦合结算指零售用户结算的合同电量、偏差电量与售电公司批发侧合同电量与偏差电量有关，受零售用户结算情况影响。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-158","source":"判断题","type":"判断","stem":"非现货市场发电企业少发电量结算价格=发电侧上调服务电量的加权平均价×K2。K2为发电侧少发电量惩罚系数，K2≤1。当月系统未调用上调服务时，以月度集中竞价交易最高成交价（或者统一出清价）乘以惩罚系数结算少发电量","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-159","source":"判断题","type":"判断","stem":"非现货市场批发交易用户少用电量的结算价格=发电侧下调服务电量的加权平均价×U2。U2为用户侧少用电量惩罚系数，U2≤1。当月系统未调用下调服务时，以月度集中竞价交易最低成交价（或者统一出清价）乘以惩罚系数结算少用电量。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-160","source":"判断题","type":"判断","stem":"非现货市场批发交易用户超用电量的结算价格=发电侧上调服务电量的加权平均价×U1。U1为用户侧超用电量惩罚系数，U1≥1。当月系统未调用上调服务时，以月度集中竞价交易最高成交价（或者统一出清价）乘以惩罚系数结算超用电量。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-161","source":"判断题","type":"判断","stem":"偿债能力指标是衡量企业偿还长期债务能力的重要财务指标。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-162","source":"判断题","type":"判断","stem":"企业的资产负债率与资本化比率是一回事。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-163","source":"判断题","type":"判断","stem":"电网企业的收入模式较为特殊，主要因为其经营自然垄断业务，受到较严格的政府监管。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-164","source":"判断题","type":"判断","stem":"用电企业不应承担电力辅助服务费用。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-165","source":"判断题","type":"判断","stem":"售电公司成本中，包括需支付给市场运营机构的费用。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-166","source":"判断题","type":"判断","stem":"电网企业成本中，不包括辅助服务成本。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-167","source":"判断题","type":"判断","stem":"国际煤炭价格大幅上涨时，对进口煤电占比较高地区的影响是本地市场电价上行压力增大","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-168","source":"判断题","type":"判断","stem":"碳中和政策对电力价格的影响主要通过限制化石能源机组发电小时数。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-169","source":"判断题","type":"判断","stem":"电力现货市场中常见的定价机制是历史成本加权平均法。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-170","source":"判断题","type":"判断","stem":"监管机构主要关注电价政策是否促进公平竞争，防止垄断和不正当竞争行为。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-171","source":"判断题","type":"判断","stem":"碳交易市场中配额价格大幅上涨，最可能反映的政策意图是通过价格信号引导企业减排。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-172","source":"判断题","type":"判断","stem":"强制配额管理是绿证交易市场的核心特征。A.强制配额管理B.政府统一定价C.企业自愿购买环境权益D.仅限跨国企业参与","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-173","source":"判断题","type":"判断","stem":"输配电价政策属于管制环节价格，在政策解读中可考虑类比天然气管网、电信网络、铁路网络等领域价格监管，开展比较解读。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-174","source":"判断题","type":"判断","stem":"需要确定合同是否是签约双方真实意愿的表达。在合同涉及到的量价费约定页，全部加盖双方公章，并在此基础上对整本合同加盖双方骑缝章是行之有效的作法。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-175","source":"判断题","type":"判断","stem":"由于各省均在推广市场公认的标准合同范本，但合同范本的使用不能够降低双方风险。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-176","source":"判断题","type":"判断","stem":"由于客户群体在自然用电行为中，存在每日、每周、每月的自然循环，因此，当数据积累的一定程度时，选取相似日曲线（或一个固定循环的时间周期曲线）作为参考","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-177","source":"判断题","type":"判断","stem":"零售合同的规范性就统一到零售套餐的规范性上，更确切的看，应规范到零售套餐的参数设计上。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-178","source":"判断题","type":"判断","stem":"零售套餐基本面向普通用电客户；对重要的用电客户（需要采取一事一议的客户），不应以投标文件的方式进行管理。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-179","source":"判断题","type":"判断","stem":"售电公司未持续满足注册条件，且未在规定时间内整改到位的应予以自愿退市","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-180","source":"判断题","type":"判断","stem":"对于强制退市的售电公司，经合同转让、拍卖等方式仍未完成处理的，已签订尚未履行的购售电合同终止履行，零售用户可以与其他售电公司签订新的零售合同，否则由保底售电公司代理该部分零售用户，并按照保底售电公司的相关条款与其签订零售合同，并处理好其他相关事宜","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-181","source":"判断题","type":"判断","stem":"自主协商期满，退出售电公司未与合同购售电各方就合同解除协商一致的，由电力交易中心征求合同购售电各方意愿，通过电力市场交易平台以转让、拍卖等方式转给其他售电公司。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-182","source":"判断题","type":"判断","stem":"与其他市场主体发生购售电合同纠纷，经法院裁定为售电公司存在诈骗等行为的，或经司法机构或司法鉴定机构裁定伪造公章等行为的可以启动强制退市流程。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-183","source":"判断题","type":"判断","stem":"售电公司出现市场串谋、提供虚假材料误导调查、散布不实市场信息等严重扰乱市场秩序的情况，可以启动自愿退市流程。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-184","source":"判断题","type":"判断","stem":"自愿退出售电公司对购售电合同各方造成的损失纳入电网不平衡资金处理。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-185","source":"判断题","type":"判断","stem":"在售电公司注册完成后，售电公司应持续满足注册条件","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-186","source":"判断题","type":"判断","stem":"现货市场地区，地方主管部门可以根据市场风险状况，适当提高售电公司履约保证缴纳标准，具体标准由各地制定报国家发改委批准。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-187","source":"判断题","type":"判断","stem":"售电公司可向用户提供综合能源服务，并收取相应费用","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-188","source":"判断题","type":"判断","stem":"售电公司不得自主选择各级电力交易机构进行跨省跨区购电和省内购电。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-189","source":"判断题","type":"判断","stem":"辅助服务市场中，调频性能系数由调节速率、调节精度、调节里程三个分项参数乘积或加权平均确定。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-190","source":"判断题","type":"判断","stem":"电力交易中心平台支持日前市场出清相关结果的查询统计，包括机组中标电量、出清价格等。省内日前现货出清后，发电企业可在规定的时间查询相关信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-191","source":"判断题","type":"判断","stem":"省间日内现货以2h为一个固定交易周期组织，固定交易周期结果发布后，不可组织临时交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-192","source":"判断题","type":"判断","stem":"省级电力现货市场复盘分析中，风险管理评估分析要评估交易过程中的风险点，包括价格波动、政策变化、市场供需等，制定响应的风险管理措施。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-193","source":"判断题","type":"判断","stem":"省级电力现货市场定位于平衡型市场，主要作用为优化省内电力资源配置、形成机组组合和交易计划，保障电力电量平衡和安全稳定供电。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-194","source":"判断题","type":"判断","stem":"省间电力现货市场目前开展日前交易、日内交易和实时交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-195","source":"判断题","type":"判断","stem":"虚拟电厂在D-1日申报截止前，未进行电力、电价申报的，则由系统填补缺省值申报。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-196","source":"判断题","type":"判断","stem":"某时段虚拟电厂用电负荷上限、下限、额定调节容量在进入市场前不需要运营机构组织相关单位完成测试认证。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-197","source":"判断题","type":"判断","stem":"对于独立储能市场主体，电力调度机构在下一次深调充电调用前，视电网运行情况安排放电。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-198","source":"判断题","type":"判断","stem":"发电企业不仅需要深入理解省内、省间电力现货市场各自的运作机制，还要了解两者的衔接机制，精准把握市场动态，同时也要充分考虑到自身的生产能力、成本结构和市场需求等因素。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-199","source":"判断题","type":"判断","stem":"日内阶段,国调中心、网调组织开展省间现货交易;网调组织开展区域内省间辅助服务交易,并开展区域内滚动校核。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-200","source":"判断题","type":"判断","stem":"日前阶段,国调中心、网调在D-2日下发基于中长期交易计划的跨省跨区通道输电计划及直调机组预计划,作为省内预出清或预平衡的边界,实现中长期与现货的时序衔接,省调根据接收的联络线预计划进行省内预出清或预平衡,确定省间交易需求。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-201","source":"判断题","type":"判断","stem":"省间电力现货交易的目的是在落实省间国家计划和中长期交易基础上,充分发挥市场作用,对富余电能资源进行大范围优化配置,但是不能促进绿色清洁发电和省间电能余缺互济。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-202","source":"判断题","type":"判断","stem":"通过省间电力现货交易,以市场化手段引导电能从平衡富余地区流向平衡紧张地区,激励发电企业在满足省内发电计划基础上主动顶峰发电,提升全网电力供应能力。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-203","source":"判断题","type":"判断","stem":"推算省内预出清价格之后，综合考虑市场的供需状况、市场参与者的行为以及市场的外部环境因素，了解省内、省间电力供需关系，为发电侧是否参与省间现货市场或省内实时现货市场提供参考依据。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-204","source":"判断题","type":"判断","stem":"可以利用历史数据、天气信息、用户用电特性等多重因素，采用先进的预测技术提高预测精度。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-205","source":"判断题","type":"判断","stem":"现货市场价格波动与对应区域供需关系、主体报价策略调整及线路阻塞等因素相关。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-206","source":"判断题","type":"判断","stem":"制定报价方案前应及时了解设备健康情况，确认是否存在影响机组出力的缺陷，避免申报出力超出机组可调出力上下限，造成限高或限低考核。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-207","source":"判断题","type":"判断","stem":"制定机组报价方案时，应结合电价预测情况，合理细分机组运行负荷段，每个负荷段的报价应结合机组边际成本及运行物理约束，使机组实际运行曲线在满足经济性的情况下，可以超过物理约束条件。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-208","source":"判断题","type":"判断","stem":"基于市场均衡的现货价格预测模型通过考虑市场供需关系和市场规则来预测现货电价，在市场结构稳定、供需关系明确、市场信息披露完善、参与市场主体较少的情况下适用性较高。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-209","source":"判断题","type":"判断","stem":"实时现货出清与日前现货出清最大的不同是在于其没有SCED，不仅因为SCED计算比较复杂，耗时较长。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-210","source":"判断题","type":"判断","stem":"SCUC/SCED考虑的系统平衡约束是指保证各时段内总发电功率能够满足总负荷要求","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-211","source":"判断题","type":"判断","stem":"电力现货市场出清的目标发电侧效益最大化。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-212","source":"判断题","type":"判断","stem":"煤电机组的固定成本不随产量变化而变化，因此在制定电力现货市场交易策略时，通常不直接考虑固定成本。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-213","source":"判断题","type":"判断","stem":"发电企业的最优现货报价策略是按边际成本竞价。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-214","source":"判断题","type":"判断","stem":"边际燃料消耗＝（额定容量总燃料消耗－50%出力总燃料消耗）/（额定容量－50%出力）；","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-215","source":"判断题","type":"判断","stem":"现阶段，我国第一批现货试点省份机组固定成本主要考虑机组的固定资产折旧费用。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-216","source":"判断题","type":"判断","stem":"系统备用容量的充足性信息对于评估实时市场的电价波动风险没有意义。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-217","source":"判断题","type":"判断","stem":"电力交易员无法通过电力交易平台实时查询其他交易员的交易策略和持仓情况。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-218","source":"判断题","type":"判断","stem":"分时价格趋势的分析可以仅依靠当前周期的负荷预测，无需考虑历史负荷数据的季节性波动。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-219","source":"判断题","type":"判断","stem":"现货市场的D-1日披露信息通常包括历史交易数据和价格走势。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-220","source":"判断题","type":"判断","stem":"广东电力现货市场于2023年12月转入正式运行。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-221","source":"判断题","type":"判断","stem":"蒙西电力现货市场已于2024年转入正式运行。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-222","source":"判断题","type":"判断","stem":"甘肃电力现货市场是我国第三个转入正式运行的省级电力现货市场。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-223","source":"判断题","type":"判断","stem":"山西电力现货市场是我国首个转入正式运行的省级电力现货市场。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-224","source":"判断题","type":"判断","stem":"按照《电力现货市场基本规则（试行）》，电力现货市场转入正式运行后，要实施市场监管和市场监测，具备开展现货市场体系第三方校验的条件。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-225","source":"判断题","type":"判断","stem":"按照《电力现货市场基本规则（试行）》，电力现货市场转入正式运行前，不用再次开展技术支持系统第三方检测。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-226","source":"判断题","type":"判断","stem":"根据《电力市场监管办法》（国家发展改革委员会2024年第18号令），市场运营机构可作出中止电力市场的决定。","options":[{"label":"对","text":"对"},{"label":"错","text "answer":["错"]},{"id":"判断题-239","source":"判断题","type":"判断","stem":"绿证是国家对发电企业每KWh可再生能源上网电量颁发的具有唯一代码标识的电子凭证","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-240","source":"判断题","type":"判断","stem":"新能源绿色电力证书简称绿证。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-241","source":"判断题","type":"判断","stem":"符合要求的风电未完成建档立卡前可以参与绿色电力交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-242","source":"判断题","type":"判断","stem":"电力中长期交易的品种主要有电能量交易、合同转让交易、输电权交易、容量交易等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-243","source":"判断题","type":"判断","stem":"对于定期开市和连续开市的交易，交易公告应当提前至少2个工作日发布。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-244","source":"判断题","type":"判断","stem":"电力集中交易中，发电企业不可作为售方申报。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-245","source":"判断题","type":"判断","stem":"中长期交易中双边合同在双边交易申报截止时间前均可提交或者修改。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-246","source":"判断题","type":"判断","stem":"在优先安排优先发电合同输电容量的前提下，鼓励发电企业、电力用户、售电公司利用剩余输电容量直接进行跨区跨省交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-247","source":"判断题","type":"判断","stem":"除电网安全约束外，不得限制发电企业在自身发电能力范围内的交易电量申报；发电权交易、合同转让交易应当遵循购售双方的意愿，不得人为设置条件。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-248","source":"判断题","type":"判断","stem":"电力用户和售电公司在单笔电力交易中的售电量不得超过其购入电能量的净值（指多次购入、售出相互抵消后的净购电量）。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-249","source":"判断题","type":"判断","stem":"滚动撮合交易可采用滚动报价、撮合成交的价格形成机制。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-250","source":"判断题","type":"判断","stem":"挂牌交易采用一方挂牌、摘牌成交的价格形成机制。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-251","source":"判断题","type":"判断","stem":"集中竞价交易中，为避免市场操纵以及恶性竞争，可对报价或者出清价格设置上、下限。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-252","source":"判断题","type":"判断","stem":"双边交易中，为避免市场操纵以及恶性竞争，可对报价或者出清价格设置上、下限。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-253","source":"判断题","type":"判断","stem":"省间交易中，市场主体不可以是某省级电网公司。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-254","source":"判断题","type":"判断","stem":"省间集中交易中，全部需要明确每日96个时段的出清方式。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-255","source":"判断题","type":"判断","stem":"省间集中交易中，需要明确是竞价交易还是挂牌交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-256","source":"判断题","type":"判断","stem":"省间集中交易中，需要明确各个输电通道的计量关口。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-257","source":"判断题","type":"判断","stem":"交易申报中，可以对于特定市场主体制定具体的申报限额","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-258","source":"判断题","type":"判断","stem":"全省统一的合同分解标准等值曲线必须在事前公告","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-259","source":"判断题","type":"判断","stem":"在长周期的交易组织中，发电侧经常出现一个并网点下的机组组合交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-260","source":"判断题","type":"判断","stem":"在中长期绿电交易中，可以限定发电侧的特定准入对象。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-261","source":"判断题","type":"判断","stem":"中长期交易中，对非定期开市的交易，可以随时公告开市。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-262","source":"判断题","type":"判断","stem":"交易规则是国家和地方政府为了实现电力市场化改革的目标而制定和发布的、具有法律效力的规范性文件。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-263","source":"判断题","type":"判断","stem":"电力市场政策文件层级一般分为法律、行政法规、部门规章、规范性文件等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-264","source":"判断题","type":"判断","stem":"比较政策文件的变化和差异，有助于把握政策文件的指导思想和发展脉络，根据变化条款更好理解新政策的优化举措。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-265","source":"判断题","type":"判断","stem":"阅读政策文件，要把握总体框架、主要内容、逻辑关系、保障体系等，明确政策文件的类型和层级。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-266","source":"判断题","type":"判断","stem":"国家层面的交易规则出台后，因各省电力市场发展程度、运营状况不同，为确保规则有效落地实施，一般来说，各省会在满足国家相关要求基础上，结合本省实际进一步制定各省交易规则或细则，","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-267","source":"判断题","type":"判断","stem":"对省级市场的交易规则，应了解省间市场运营现状、现行交易规则，有助于更好理解规则制定意图。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-268","source":"判断题","type":"判断","stem":"解读电力市场政策文件，首先要分析政策文件的背景和目的。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-269","source":"判断题","type":"判断","stem":"政策文件的类型和层级决定了政策文件的权威性和适用范围。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-270","source":"判断题","type":"判断","stem":"了解规则制定背后的政策驱动因素对于理解规则细节具有重要意义，了解制定规则的目的有助于理解规则的设计思路。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-271","source":"判断题","type":"判断","stem":"电力交易规则是电力市场运行的基石，它规定了市场参与者的权利和义务，影响着电力资源的优化配置和电价的形成。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-272","source":"判断题","type":"判断","stem":"电力市场运行基本规则是针对中长期交易出台的全面性总体准则。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-273","source":"判断题","type":"判断","stem":"电力市场的市场准入与退出机制是保障市场公平竞争和高效运行的重要手段。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-274","source":"判断题","type":"判断","stem":"通过精读规则条款提取关键信息，能有效帮助市场参与者做出清晰判断。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-275","source":"判断题","type":"判断","stem":"交易规则印发是对过去规则执行情况的总结与反馈，通过结合当下政策导向对比交易规则，有助于更好的理解和执行交易规则。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-276","source":"判断题","type":"判断","stem":"电子签章的管理涉及存储、备份、更新、撤销和权限控制等方面，需要确保签章的安全性和合法性。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-277","source":"判断题","type":"判断","stem":"账号权限变更可能由多种原因引起，包括岗位调整、职责扩展、临时任务、安全考虑等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-278","source":"判断题","type":"判断","stem":"账号权限设置是确保账号只能访问和操作其被授权资源的关键环节，通常采用基于角色的访问控制方法。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-279","source":"判断题","type":"判断","stem":"经营主体的注册登记和交易资质审核是电力市场准入管理的重要环节，需要收集和审核经营主体的相关资料。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-280","source":"判断题","type":"判断","stem":"预测市场运行和分析市场动态不是电力交易人员的重要职责，可以由其他部门代为完成。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-281","source":"判断题","type":"判断","stem":"电力交易人员在组织与协调过程中需要密切关注市场动态，及时调整交易策略，以最大化经营主体的利益。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-282","source":"判断题","type":"判断","stem":"加强对市场主体披露信息的管理，切实落实交易机构总体负责信息披露实施的职责。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-283","source":"判断题","type":"判断","stem":"对未按要求及时披露、变更或者披露虚假信息、误导性陈述或者重大遗漏的市场成员，一年之内出现上述情形三次以上的，各单位可对其采取警示提醒、约谈、通报、上报监管机构。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-284","source":"判断题","type":"判断","stem":"对社会公众、市场成员提出的披露信息异议，由电力交易中心组织相关信息披露主体解释、说明或者提供相关资料。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-285","source":"判断题","type":"判断","stem":"信息披露平台原则上以电力交易机构现有信息平台为基础。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-286","source":"判断题","type":"判断","stem":"发电企业机组的单机最大出力信息属于特定信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-287","source":"判断题","type":"判断","stem":"市场信息披露文档形式以可导出的、常规文件格式为主。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-288","source":"判断题","type":"判断","stem":"市场竞争所需信息应当充分披露，信息披露主体对其提供信息的真实性、准确性、及时性负责。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-289","source":"判断题","type":"判断","stem":"按照信息公开范围，电力现货市场信息分为公众信息、公开信息、特定信息三类。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-290","source":"判断题","type":"判断","stem":"信息披露应当遵循安全、真实、准确、完整、及时、易于使用的原则。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-291","source":"判断题","type":"判断","stem":"电力市场信息应封存3年","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-292","source":"判断题","type":"判断","stem":"电力用户的可参与系统调节的响应能力和响应方式属于公开信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-293","source":"判断题","type":"判断","stem":"发电企业披露的单机最大出力属于特定信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-294","source":"判断题","type":"判断","stem":"特定信息是指根据电力市场运营需要向特定市场成员披露的信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-295","source":"判断题","type":"判断","stem":"价差分成套餐中，零售用户电费计算包含输配电价、政府性基金及附加等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-296","source":"判断题","type":"判断","stem":"售电公司有隐瞒有关情况或者以提供虚假申请材料等方式违法违规进入市场，且拒不整改的，不会启动强制退出程序。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-297","source":"判断题","type":"判断","stem":"售电公司与零售用户约定各时段用电电价与售电公司各时段批发侧交易基准均价联动分成的套餐是价差分成套餐。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-298","source":"判断题","type":"判断","stem":"售电公司参与批发和（或）零售市场交易前，提交履约保函、履约保证保险等履约保障凭证的额度，只需按照过去12个月批发市场交易总电量，按标准不低于0.8分/千瓦时的金额缴纳。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-299","source":"判断题","type":"判断","stem":"退出市场的市场主体，履行或者处理完成交易合同有关事项后，无需予以注销。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-300","source":"判断题","type":"判断","stem":"电力用户发生用电类别、用电户号变化等情况时，只需在电网企业办理变更，无需在电力交易机构办理注册信息变更手续。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-301","source":"判断题","type":"判断","stem":"市场主体注册信息发生重大变化，如市场主体类别、法人、业务范围、公司主要股东等，无需再次予以承诺、公示。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-302","source":"判断题","type":"判断","stem":"企事业单位、机关团体等办理注册手续时，无需提供单位名称、法人代表、联系方式等信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-303","source":"判断题","type":"判断","stem":"参与批发交易的市场主体，无需办理数字安全证书或者采取同等安全等级的身份认证手段。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-304","source":"判断题","type":"判断","stem":"内蒙古西部地区市场主体登录广州电力交易中心交易平台参与省间中长期交易。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-305","source":"判断题","type":"判断","stem":"挂牌交易中，市场主体可在任意时间内将购电或售电信息挂牌。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-306","source":"判断题","type":"判断","stem":"省间电力市场的电力中长期交易尚未实现按工作日连续开市。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-307","source":"判断题","type":"判断","stem":"一般来说，集中交易组织的频次相对较高。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-308","source":"判断题","type":"判断","stem":"集中交易包括集中竞价交易、滚动撮合交易和双边协商交易三种形式。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-309","source":"判断题","type":"判断","stem":"电力中长期集中交易需经电力调度机构安全校核。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-310","source":"判断题","type":"判断","stem":"合同转让交易可以通过融合交易实现。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-311","source":"判断题","type":"判断","stem":"合同转让无须通过电网安全校核。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-312","source":"判断题","type":"判断","stem":"售电公司或批发用户可以将存量合同电量转让给批发市场的其他发电侧市场主体。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-313","source":"判断题","type":"判断","stem":"月内（多日）电量交易以当月所有天数的电量或者特定天数的电量作为交易标的物。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-314","source":"判断题","type":"判断","stem":"参与绿色电力交易的经营主体包括发电企业、电力交易机构、电力用户、售电公司","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-315","source":"判断题","type":"判断","stem":"影响用电侧负荷预测的参数非常多。但每个因数在不同的季节、用电企业行业环境基本相同。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-316","source":"判断题","type":"判断","stem":"作为风电、光伏电厂等新能源企业，负荷预测依赖大量的气象条件。因此需要有专业的数据接口提供，提供及时、准确和完整的数据服务。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-317","source":"判断题","type":"判断","stem":"售电公司获得电力用户的历史用电量无须用户授权。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-318","source":"判断题","type":"判断","stem":"售电公司需要了解本省市场（含分区）标准等值负荷曲线的形状。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-319","source":"判断题","type":"判断","stem":"在现货市场存在价格分区的情况，售电公司需要掌握每个分区中其签约的每个用户的电力、电量情况。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-320","source":"判断题","type":"判断","stem":"售电公司完全不需要掌握用电电力或电量占本售电企业总电力电量超过10%的用户生产情况；","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-321","source":"判断题","type":"判断","stem":"对于一个售电公司来说，要分清楚在未来一个具体时间每个签约的电力用户具体的电力电量是一件非常困难的事情。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-322","source":"判断题","type":"判断","stem":"对于城市垃圾焚烧电厂，由于其发电容量占系统总量比例很大，可以用历史数据结合城市规划做发电预测。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-323","source":"判断题","type":"判断","stem":"对于可再生能源机组，包括风电、太阳能以及水电等，对天气预测数据的依赖占主导地位，这部分发电企业，只需要结合天气情况即可进行可发电能力的综合判断。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-324","source":"判断题","type":"判断","stem":"常见的燃煤发电企业，影响其运营价格的最大成本是一次能源（煤炭、天然气）的价格。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-325","source":"判断题","type":"判断","stem":"发电设备利用率是指在考虑需要满足系统用电负荷变化调节基础上，发电设备可能的利用率。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-326","source":"判断题","type":"判断","stem":"目前，国网范围内主要使用“网上国网”app手机移动端，为电力用户提供便捷高效的电力交易服务。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-327","source":"判断题","type":"判断","stem":"通过电力交易平台查询政策规则，应从首页“信息披露”模块进入。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-328","source":"判断题","type":"判断","stem":"电力交易机构负责电力市场信息披露的实施，并以“e-交易”为基础设立信息披露平台。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-329","source":"判断题","type":"判断","stem":"通过政府部门（机构）官方网站查询政策文件，通常可以在“互动交流”栏中查询到。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-330","source":"判断题","type":"判断","stem":"获取政策、规则的渠道主要包括国家、区域和地方相关职能部门、相关机构的官方网站、微信公众号等渠道。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-331","source":"判断题","type":"判断","stem":"国家电网区域400统一电力交易服务热线主要受理客户关于省（自治区、直辖市）内交易规则、市场准入、交易组织、交易合同、交易结算、信息披露、平台应用等涉及电力交易方面咨询、投诉、举报、意见等业务。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-332","source":"判断题","type":"判断","stem":"电力交易中心官方网站，电力市场相关的交易规则可在网站内“市场服务”—“业务介绍”—“交易规则”中查询到。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-333","source":"判断题","type":"判断","stem":"电力交易规则包括由国家部委制定的基本规则，以及各区域（省）制定的针对特定区域、特定交易品种的各类交易规则。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-334","source":"判断题","type":"判断","stem":"“e-交易”app不具备搜索政策文件功能。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-335","source":"判断题","type":"判断","stem":"用户打开“e-交易”app进入到我的页面，点击立即登录，进入到登录页面，输入账号密码后即可登录成功。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-336","source":"判断题","type":"判断","stem":"各省电力交易平台均具备电力交易政策规则查询功能。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-337","source":"判断题","type":"判断","stem":"通过政府部门官方网站查询政策文件，只能通过站内政策发布板块查询。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-338","source":"判断题","type":"判断","stem":"政策文件指由国家相关职能部门制定的重要指导文件。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-339","source":"判断题","type":"判断","stem":"微信公众号不是主流媒体，因此不能通过国家能源局官方微信公众号获取交易规则。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-340","source":"判断题","type":"判断","stem":"各级电力交易大厅为市场主体提供服务，包括开展市场注册、合同签订、交易结算等交易业务受理等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-341","source":"判断题","type":"判断","stem":"国家电网区域400统一电力交易服务热线电话是400895598。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-342","source":"判断题","type":"判断","stem":"国家电网区域400统一电力交易服务热线，依托国网客服中心95598服务体系架构，结合国家相关政策要求和国网供区内交易中心编制了电力交易知识库，为电力交易市场主体及其相关方提供优质的电力市场咨询服务。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-343","source":"判断题","type":"判断","stem":"交易机构通常为市场主体咨询市场交易业务提供如下三种方式：电力交易服务热线、电力交易大厅、交易机构联络方式。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-344","source":"判断题","type":"判断","stem":"打开“e-交易”app后，就可以通过信息披露板块查询交易规则。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-345","source":"判断题","type":"判断","stem":"“e-交易”app是广州电力交易中心有限公司推出的一款电力综合服务移动应用，致力于为电力用户提供优质高效的电力交易相关服务。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-346","source":"判断题","type":"判断","stem":"400热线号码的服务原则是“一口对外、一号通答”。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-347","source":"判断题","type":"判断","stem":"售电公司注册时，从业人员要求拥有15名及以上具有劳动关系的全职专业人员。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-348","source":"判断题","type":"判断","stem":"电力市场售电企业的合法主体是的是按照《中华人民共和国公司法》进行工商注册，具有独立法人资格的售电公司","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-349","source":"判断题","type":"判断","stem":"电力市场主体的准入步骤是“一承诺，一公示，一注册，一备案。”","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-350","source":"判断题","type":"判断","stem":"直接参与批发市场交易的用户在新一代电力交易平台注册过程中，填写基本信息时需勾选“注册成直接交易用户”。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-351","source":"判断题","type":"判断","stem":"办理售电增项业务的发电企业，应当分别以发电企业和售电公司的市场主体类别进行注册。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-352","source":"判断题","type":"判断","stem":"在跨区跨省交易中，国调中心及各网调直调发电企业在北京电力交易中心注册。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-353","source":"判断题","type":"判断","stem":"发电企业的机组信息变更，不涉及物理运行参数信息的，由发电企业向电力交易机构提供。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-354","source":"判断题","type":"判断","stem":"市场主体注册申请提交成功后，由交易中心开展注册审核，点击【查看状态】，可查看注册申请受理审核进度，审核完成后反馈结果及相关处理意见。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-355","source":"判断题","type":"判断","stem":"售电公司在进行市场准入时，必须提交公司名称作为审核内容之一。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-356","source":"判断题","type":"判断","stem":"售电公司如果被发现提供虚假材料进入市场，但已进行了整改，就不会启动强制退出程序。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-357","source":"判断题","type":"判断","stem":"市场运营机构在审核市场主体资质时，不需要与市场主体进行任何沟通或现场考察。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-358","source":"判断题","type":"判断","stem":"发电企业可以登录电力交易平台，按相关政策规定填报详细注册信息，电力交易机构受理其注册申请，对其注册资料进行完整性审查，无问题后，生效其注册申请。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-359","source":"判断题","type":"判断","stem":"公开信息是指向社会公众披露的信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-360","source":"判断题","type":"判断","stem":"信息披露主体可自行选择信息格式通过信息披露平台向电力交易机构提供。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-361","source":"判断题","type":"判断","stem":"社会公众信息是指向社会公众披露的信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-362","source":"判断题","type":"判断","stem":"电力用户应当披露的公开信息包括用户类别、接入地区、年用电量、用电电压等级、供电方式、自备电源(如有)、变压器报装容量以及最大需量等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-363","source":"判断题","type":"判断","stem":"“交易公告”类信息一般属于公众信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-364","source":"判断题","type":"判断","stem":"信息披露内容包括但不限于市场主体信息、市场运营信息、市场监管信息、市场成员信用信息、电网运行信息等所有可能对市场交易产生较大影响的信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-365","source":"判断题","type":"判断","stem":"电力交易机构负责通过信息披露平台向所有市场主体披露相关考核和补偿结果，制定信息披露标准格式，开放数据接口。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-366","source":"判断题","type":"判断","stem":"监测市场运行和分析市场动态是电力交易人员的重要职责之一。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-367","source":"判断题","type":"判断","stem":"账号权限设置是确保账号只能访问和操作其被授权资源的关键环节。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-368","source":"判断题","type":"判断","stem":"电网企业电力交易员参与跨省区的电力交易和协调。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-369","source":"判断题","type":"判断","stem":"客户仅可通过所在省（自治区、直辖市）交易中心联系电话进行业务咨询。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-370","source":"判断题","type":"判断","stem":"交易组织信息包括交易公告、交易过程和交易结果。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-371","source":"判断题","type":"判断","stem":"中长期交易结算按照结算方式可分为电力批发交易结算和电力零售交易结算。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-372","source":"判断题","type":"判断","stem":"开展现货市场的省级市场中，结算时段是指市场进行结算的最小时段，最小时段为小时。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-373","source":"判断题","type":"判断","stem":"某条输电线路出现故障检修，可能会改变区域间的电力交易流向和报价。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-374","source":"判断题","type":"判断","stem":"参与电力交易的市场主体在平台上的交易信息属于商业机密，平台应严格保密，不得向任何第三方透露。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-375","source":"判断题","type":"判断","stem":"通过电力交易平台查询交易规则，可以通过“市场服务”—“政策法规”查询。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-376","source":"判断题","type":"判断","stem":"通过电力交易机构官方网站查询交易规则，可以通过“市场服务”—“政策法规”菜单查询。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-377","source":"判断题","type":"判断","stem":"近年来，人工智能（AI）大模型以其强大的语义理解能力、复杂任务处理能力以及跨领域知识整合能力，逐渐成为一项更为精准的、重要的搜索渠道，所以通过AI搜索的各类信息都是准确的。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-378","source":"判断题","type":"判断","stem":"通过地方经济和信息化厅（委员会）官方网站、微信公众号，可以查询到该地方电力交易规则及政策。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-379","source":"判断题","type":"判断","stem":"获取交易政策、规则的渠道主要包括国家、区域和地方相关职能部门、相关机构的官方网站、微信公众号等渠道。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-380","source":"判断题","type":"判断","stem":"参与市场化交易需要掌握电价改革相关政策、规则，通过多途径及时收集、获取关键信息，了解改革发展方向，为企业经营决策提供参考依据。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-381","source":"判断题","type":"判断","stem":"400热线号码对于举报类工单，应于30min内派发工单，交易中心在1个工作日内联系客400户，5个工作日内完成回复。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-382","source":"判断题","type":"判断","stem":"400客服团队的服务原则是“一口受理、规范服务”。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-383","source":"判断题","type":"判断","stem":"经营主体在获得业务授权后，可使用企业管理员账号将其业务权限的部分或全部授权给其子账号。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-384","source":"判断题","type":"判断","stem":"电子签章生成只需要使用公钥，不需要私钥。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-385","source":"判断题","type":"判断","stem":"售电公司电力交易员不负责处理客户投诉和咨询。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-386","source":"判断题","type":"判断","stem":"电力市场主体资质管理的主要目的是确保市场主体具备参与电力交易的必要条件和能力。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-387","source":"判断题","type":"判断","stem":"电力市场主体资质管理的主要目的是确保市场主体具备参与电力交易的必要条件和能力。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-388","source":"判断题","type":"判断","stem":"发电企业在平台申报的机组出力曲线必须与实际机组运行能力相符，否则将面临处罚。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-389","source":"判断题","type":"判断","stem":"在电力交易平台进行跨省区交易时，无需考虑不同地区的电力市场规则差异。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-390","source":"判断题","type":"判断","stem":"电力用户在平台参与增量配电业务改革试点项目的电力交易时，其电价计算方式与普通用户相同。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-391","source":"判断题","type":"判断","stem":"发电企业在平台上申报的电量可以超过自身的发电能力，只要后续能完成发电即可。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-392","source":"判断题","type":"判断","stem":"售电公司在平台代理多个电力用户进行交易时，可将所有用户的电量打包统一申报，无需区分用户。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-393","source":"判断题","type":"判断","stem":"电力交易平台允许市场主体使用临时生成的不规范数字证书进行交易操作。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-394","source":"判断题","type":"判断","stem":"电力交易平台中，对于挂牌交易，挂牌方一旦挂出价格和电量，就不能再进行修改。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-395","source":"判断题","type":"判断","stem":"电力交易平台规定，发电企业只能按照平台给定的标准电量套餐进行申报，不能自主设定申报电量。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-396","source":"判断题","type":"判断","stem":"在电力交易平台进行报价时，申报的价格必须是整数，不允许出现小数。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-397","source":"判断题","type":"判断","stem":"电力用户在平台上选择售电公司后，在合同期内不能再更换售电公司。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-398","source":"判断题","type":"判断","stem":"若预测到未来一段时间市场供需比将大幅波动，在没有电价预测的条件下，电力交易报价策略应保持不变。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-399","source":"判断题","type":"判断","stem":"考虑到线路损耗，在跨区域电力交易报价时应适当调整价格。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-400","source":"判断题","type":"判断","stem":"新能源发电在满发状态下，其出力特征与传统火电一致。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-401","source":"判断题","type":"判断","stem":"电源结构多元化有利于增强电力系统应对不同工况的能力，对交易报价有积极意义。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-402","source":"判断题","type":"判断","stem":"工业负荷在用电高峰时段和低谷时段的用电量差异不明显。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-403","source":"判断题","type":"判断","stem":"机组的变动成本是决定其在电力交易中是否参与报价的关键因素之一。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-404","source":"判断题","type":"判断","stem":"水电受季节和来水情况影响较大，在枯水期其发电出力会降低。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-405","source":"判断题","type":"判断","stem":"市场供需比小于1，表明电力供不应求，发电企业报价可适当提高。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-406","source":"判断题","type":"判断","stem":"机组的固定成本不影响其参与电力交易的报价下限。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-407","source":"判断题","type":"判断","stem":"电源结构中，火电占比越高，电力供应的稳定性通常相对越强。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-408","source":"判断题","type":"判断","stem":"发电企业在进行机组检修及设备改造计划披露时，可以进行新增、删除、编辑等操作。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-409","source":"判断题","type":"判断","stem":"发电企业在进行电厂机组信息披露时，首次披露需要用户自主进行新增操作。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-410","source":"判断题","type":"判断","stem":"发电企业在查看停复牌历史记录时，可以预览和下载附件信息，但不能查看详细信息。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-411","source":"判断题","type":"判断","stem":"发电企业在进行停复牌申报时，申请自主停牌需要选择停牌日期和复牌日期。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-412","source":"判断题","type":"判断","stem":"发电企业在进行机组信息注册时，可以通过复制已注册机组信息来快速完成类似参数机组的注册。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-413","source":"判断题","type":"判断","stem":"发电企业在进行基本信息变更时，所有变更都需要交易中心审批。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-414","source":"判断题","type":"判断","stem":"发电企业在查询交易结果时，只能查看自己参与的交易的无约束成交结果。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-415","source":"判断题","type":"判断","stem":"摘牌方在进行摘牌操作时，可以查看挂牌方的电量和电价信息，但不能查看相关协议文件。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-416","source":"判断题","type":"判断","stem":"发电企业在进行挂牌方挂牌操作时，申报电量和电价必须在规定的限额范围内。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-417","source":"判断题","type":"判断","stem":"双边交易申报中，申报方在首次进入交易序列的申报页面时，需要确认交易承诺书。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-418","source":"判断题","type":"判断","stem":"发电企业在电力交易平台进行交易公告查看时，只能查看本企业参与的交易序列。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-419","source":"判断题","type":"判断","stem":"市场经营主体披露信息的规则以各地方的电力交易中心制定为主。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-420","source":"判断题","type":"判断","stem":"对于发、售电企业，主要审查其发电设施的技术参数、环保标准、运行维护能力等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-421","source":"判断题","type":"判断","stem":"市场力相关风险指的是在电力市场中，某些市场经营主体因其规模、资源控制或信息优势而拥有影响市场价格和交易条件的能力。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-422","source":"判断题","type":"判断","stem":"等报价串谋具有报价相似、报价改变同步和易高价中标等特点。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-423","source":"判断题","type":"判断","stem":"为了应对燃料成本带来的电价风险，发电企业通常会采取多种策略，如多元化燃料来源、签订长期燃料供应合同、使用金融衍生品进行风险对冲等。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["对"]},{"id":"判断题-424","source":"判断题","type":"判断","stem":"电力交易机构认定市场经营主体不良（负面）行为情节严重、对市场造成较大不良影响的，可对实施不良行为的市场经营主体采取书面警示。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-425","source":"判断题","type":"判断","stem":"信用评级是电力市场信用风险管理的核心工具，它通过量化的方式评估市场经营主体的信用状况。并且信用评级业务是每个交易中心独立开展，不存在第三方开展的情况。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]},{"id":"判断题-426","source":"判断题","type":"判断","stem":"全社会、全行业、产业链全流程的信用数据不流通也可以对信用风险进行预警和评估。","options":[{"label":"对","text":"对"},{"label":"错","text":"错"}],"answer":["错"]}]};
  </script>
  <script>
    const STORAGE_KEY = "powerTraderQuizState.v1";
    const bank = window.QUESTION_BANK || { meta: {}, questions: [] };
    const questions = bank.questions;
    const state = {
      mode: "random",
      filter: "all",
      search: "",
      current: null,
      selected: new Set(),
      submitted: false,
      correct: false,
      orderIndex: 0,
      stats: loadStats()
    };

    const els = {
      metaText: document.getElementById("metaText"),
      doneCount: document.getElementById("doneCount"),
      accuracy: document.getElementById("accuracy"),
      wrongCount: document.getElementById("wrongCount"),
      questionCard: document.getElementById("questionCard"),
      submitButton: document.getElementById("submitButton"),
      skipButton: document.getElementById("skipButton"),
      resetButton: document.getElementById("resetButton"),
      searchInput: document.getElementById("searchInput"),
      helpButton: document.getElementById("helpButton"),
      helpDrawer: document.getElementById("helpDrawer"),
      installButton: document.getElementById("installButton"),
      offlineText: document.getElementById("offlineText")
    };

    let deferredInstallPrompt = null;

    function loadStats() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return {
          answered: Number(saved.answered || 0),
          correct: Number(saved.correct || 0),
          wrongIds: Array.isArray(saved.wrongIds) ? saved.wrongIds : [],
          history: saved.history && typeof saved.history === "object" ? saved.history : {}
        };
      } catch {
        return { answered: 0, correct: 0, wrongIds: [], history: {} };
      }
    }

    function saveStats() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.stats));
    }

    function filteredQuestions() {
      const term = state.search.trim();
      return questions.filter((question) => {
        const typeOk = state.filter === "all" || question.type === state.filter;
        const searchOk = !term || question.stem.includes(term);
        const wrongOk = state.mode !== "wrong" || state.stats.wrongIds.includes(question.id);
        return typeOk && searchOk && wrongOk;
      });
    }

    function pickQuestion() {
      const pool = filteredQuestions();
      state.selected = new Set();
      state.submitted = false;
      state.correct = false;
      if (!pool.length) {
        state.current = null;
        render();
        return;
      }

      if (state.mode === "order") {
        state.orderIndex = state.orderIndex % pool.length;
        state.current = pool[state.orderIndex];
        state.orderIndex += 1;
      } else {
        const index = Math.floor(Math.random() * pool.length);
        state.current = pool[index];
      }
      render();
    }

    function setMode(mode) {
      state.mode = mode;
      document.querySelectorAll("[data-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
      pickQuestion();
    }

    function setFilter(filter) {
      state.filter = filter;
      state.orderIndex = 0;
      document.querySelectorAll("[data-filter]").forEach((button) => {
        button.classList.toggle("active", button.dataset.filter === filter);
      });
      pickQuestion();
    }

    function selectOption(label) {
      if (!state.current || state.submitted) return;
      if (state.current.type === "多选") {
        state.selected.has(label) ? state.selected.delete(label) : state.selected.add(label);
      } else {
        state.selected = new Set([label]);
      }
      render();
    }

    function sameAnswer(selected, answer) {
      if (selected.size !== answer.length) return false;
      return answer.every((item) => selected.has(item));
    }

    function submitAnswer() {
      if (!state.current || !state.selected.size || state.submitted) return;
      const correct = sameAnswer(state.selected, state.current.answer);
      state.submitted = true;
      state.correct = correct;
      state.stats.answered += 1;
      if (correct) state.stats.correct += 1;
      state.stats.history[state.current.id] = {
        selected: Array.from(state.selected),
        correct,
        at: new Date().toISOString()
      };
      const wrongSet = new Set(state.stats.wrongIds);
      correct ? wrongSet.delete(state.current.id) : wrongSet.add(state.current.id);
      state.stats.wrongIds = Array.from(wrongSet);
      saveStats();
      render();
    }

    function resetStats() {
      if (!confirm("确认清空本机刷题记录和错题本？")) return;
      state.stats = { answered: 0, correct: 0, wrongIds: [], history: {} };
      saveStats();
      pickQuestion();
    }

    function answerText(question) {
      if (question.type === "判断") return question.answer.join("");
      return question.answer.map((label) => {
        const option = question.options.find((item) => item.label === label);
        return option ? `${label}. ${option.text}` : label;
      }).join("；");
    }

    function renderStats() {
      const answered = state.stats.answered;
      els.doneCount.textContent = answered;
      els.accuracy.textContent = answered ? `${Math.round(state.stats.correct / answered * 100)}%` : "0%";
      els.wrongCount.textContent = state.stats.wrongIds.length;
      els.metaText.textContent = `${bank.meta.total || questions.length} 道题 · 单选 ${bank.meta.byType?.单选 || 0} · 多选 ${bank.meta.byType?.多选 || 0} · 判断 ${bank.meta.byType?.判断 || 0}`;
    }

    function renderQuestion() {
      const question = state.current;
      const poolCount = filteredQuestions().length;
      if (!question) {
        els.questionCard.innerHTML = `<div class="empty">当前条件下没有题目。可以切回全部题型，或先完成一些错题后再进入错题模式。</div>`;
        els.submitButton.disabled = true;
        els.submitButton.textContent = "提交答案";
        return;
      }

      const tagClass = question.type === "多选" ? "multi" : question.type === "判断" ? "judge" : "";
      const optionsHtml = question.options.map((option) => {
        const selected = state.selected.has(option.label);
        const isRight = question.answer.includes(option.label);
        const isWrongPick = state.submitted && selected && !isRight;
        const classes = [
          "option",
          selected ? "selected" : "",
          state.submitted && isRight ? "correct" : "",
          isWrongPick ? "wrong" : ""
        ].filter(Boolean).join(" ");
        return `
          <button class="${classes}" data-option="${option.label}" aria-pressed="${selected}">
            <span class="letter">${option.label}</span>
            <span class="option-text">${escapeHtml(option.text)}</span>
          </button>`;
      }).join("");

      const feedback = state.submitted
        ? `<div class="feedback ${state.correct ? "good" : "bad"}">
            <strong>${state.correct ? "答对了" : "答错了"}</strong><br>
            正确答案：${escapeHtml(answerText(question))}
          </div>`
        : "";

      els.questionCard.innerHTML = `
        <div class="question-head">
          <div class="tag-row">
            <span class="tag ${tagClass}">${question.type}</span>
            <span class="tag">${question.source}</span>
          </div>
          <span class="progress-text">${poolCount} 题可练</span>
        </div>
        <div class="stem">${escapeHtml(question.stem)}</div>
        <div class="options">${optionsHtml}</div>
        ${feedback}`;

      els.questionCard.querySelectorAll("[data-option]").forEach((button) => {
        button.addEventListener("click", () => selectOption(button.dataset.option));
      });
      els.submitButton.disabled = !state.selected.size;
      els.submitButton.textContent = state.submitted ? "下一题" : "提交答案";
    }

    function render() {
      renderStats();
      renderQuestion();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.querySelectorAll("[data-mode]").forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });

    document.querySelectorAll("[data-filter]").forEach((button) => {
      button.addEventListener("click", () => setFilter(button.dataset.filter));
    });

    els.submitButton.addEventListener("click", () => {
      if (state.submitted) pickQuestion();
      else submitAnswer();
    });

    els.skipButton.addEventListener("click", pickQuestion);
    els.resetButton.addEventListener("click", resetStats);
    els.helpButton.addEventListener("click", () => els.helpDrawer.classList.toggle("open"));
    els.searchInput.addEventListener("input", (event) => {
      state.search = event.target.value;
      state.orderIndex = 0;
      pickQuestion();
    });

    window.addEventListener("beforeinstallprompt", (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      els.installButton.hidden = false;
    });

    els.installButton.addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      els.installButton.hidden = true;
    });

    window.addEventListener("online", () => { els.offlineText.textContent = "离线可用"; });
    window.addEventListener("offline", () => { els.offlineText.textContent = "已离线"; });


    pickQuestion();
  </script>
</body>
</html>
